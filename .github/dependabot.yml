---
version: 2
updates:
  # GitHub Actions — weekly. Dependabot preserves the `# vX.Y.Z` comment next to
  # each SHA-pinned action, so the logical version stays readable while the SHA
  # bumps (satisfies Scorecard Dependency-Update-Tool + keeps Pinned-Dependencies fresh).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Recife
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - github-actions
    # Group all minor/patch action bumps into ONE PR. Without this,
    # Dependabot splits github/codeql-action/* and other actions into
    # separate PRs; grouping cuts weekly PR volume and (for repos that
    # run full CodeQL) prevents init/analyze/upload version skew.
    # Majors stay separate for deliberate review.
    groups:
      github-actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]
