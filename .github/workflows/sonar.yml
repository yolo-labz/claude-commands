name: SonarQube scan

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege baseline (zizmor undocumented-permissions wants a rationale).
permissions:
  contents: read       # checkout source for the scan.
  pull-requests: read  # scan-action reads PR metadata to decorate the PR.

jobs:
  scan:
    name: SonarQube scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout (full history for blame-based new-code detection)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Skip if SonarQube host not configured
        id: check
        env:
          HOST: ${{ vars.SONAR_HOST_URL }}
        run: |
          if [ -z "$HOST" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "SONAR_HOST_URL not set - skipping Sonar scan."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: SonarQube scan
        if: steps.check.outputs.skip == 'false'
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
