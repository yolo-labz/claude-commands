name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate slash-command markdown files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate command markdown structure
        run: |
          set -euo pipefail
          fail=0
          # Every root-level *.md (except README.md) is a slash-command and must
          # be non-empty. Frontmatter is optional for slash-commands.
          while IFS= read -r f; do
            case "$f" in
              README.md|CHANGELOG.md|SECURITY.md) continue ;;
            esac
            if [ ! -s "$f" ]; then
              echo "::error file=$f::Empty command file"
              fail=1
            fi
          done < <(git ls-files '*.md' | grep -v '/')
          exit "$fail"

  actionlint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color
